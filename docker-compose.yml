volumes:
  # The YAML key "openclaw_home" is the internal compose reference used by
  # all services below.  `name:` sets the actual Docker volume name (no
  # project-name prefix), controlled via OPENCLAW_HOME_VOLUME in .env.
  openclaw_home:
    name: ${OPENCLAW_HOME_VOLUME:-openclaw_home}

  # Star Office UI persistent data (state.json, join-keys.json, runtime-config …)
  star_office_data:
    name: ${STAR_OFFICE_DATA_VOLUME:-star_office_data}

services:
  # ── One-shot Playwright browser installer ──────────────────────────────────
  # Runs before the gateway. `playwright install chromium` is idempotent:
  # skips if the correct version is already in the volume, installs (or
  # upgrades) otherwise.  This ensures the browser version always matches
  # the playwright-core bundled in the current image.
  playwright-init:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: "node"
    environment:
      HOME: /home/node
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/home/node/.cache/ms-playwright}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - openclaw_home:/home/node
      #- ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      #- ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    restart: "no"
    command:
      - sh
      - -c
      - |
        echo "[playwright-init] Ensuring Playwright Chromium is up-to-date..."
        PLAYWRIGHT_BROWSERS_PATH="${PLAYWRIGHT_BROWSERS_PATH:-/home/node/.cache/ms-playwright}" \
          node /app/node_modules/playwright-core/cli.js install chromium
        echo "[playwright-init] Done."

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    build:
      context: openclaw
      dockerfile: Dockerfile
      args:
        OPENCLAW_BASE_IMAGE: ${OPENCLAW_BASE_IMAGE:-ghcr.io/openclaw/openclaw:latest}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/home/node/.cache/ms-playwright}
    volumes:
      - openclaw_home:/home/node
      #- ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      #- ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    depends_on:
      playwright-init:
        condition: service_completed_successfully
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    network_mode: service:openclaw-gateway
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1},openclaw-gateway
      PLAYWRIGHT_BROWSERS_PATH: ${PLAYWRIGHT_BROWSERS_PATH:-/home/node/.cache/ms-playwright}
    volumes:
      - openclaw_home:/home/node
      #- ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      #- ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  # ── Star Office UI ──────────────────────────────────────────────────────────
  # Pixel-art AI agent status dashboard.
  # Mounts star_office_data for runtime state persistence and openclaw_home
  # read-only so the 昨日小記 feature can reach openclaw's workspace memory.
  star-office-ui:
    build:
      context: star-office
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      ASSET_DRAWER_PASS: ${ASSET_DRAWER_PASS}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-nanobanana-pro}
      STAR_OFFICE_ENV: ${STAR_OFFICE_ENV:-production}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    volumes:
      - star_office_data:/data
      # Read-only mount of openclaw home; entrypoint wires /memory ->
      # /home/node/.openclaw/workspace/memory for the 昨日小記 feature.
      - openclaw_home:/home/node:ro
    ports:
      - "${STAR_OFFICE_PORT:-18791}:18791"
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18791/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
